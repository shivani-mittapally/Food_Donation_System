<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Food Donation System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-page">
<div class="auth-box">
  <!-- Logo -->
  <div class="auth-logo">
    <div class="icon">🍱</div>
    <h1>Welcome Back</h1>
    <p>Sign in to your FoodDonate account</p>
  </div>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }}">
        <i class="fas fa-info-circle"></i> {{ msg }}
      </div>
    {% endfor %}
  {% endwith %}

  <div class="auth-card">
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-grid" style="gap:16px">
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:13px">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </div>
    </form>

    <div style="text-align:center; margin-top:20px; padding-top:20px; border-top:1px solid var(--border)">
      <p style="color:var(--text-muted); font-size:.875rem">
        Don't have an account?
        <a href="{{ url_for('signup') }}" style="font-weight:600">Create one</a>
      </p>
    </div>

    <!-- Demo credentials hint -->
    <div style="margin-top:16px; background:rgba(34,197,94,.06); border:1px solid rgba(34,197,94,.2); border-radius:8px; padding:12px 16px; font-size:.8rem; color:var(--text-muted)">
      <strong style="color:var(--green)">Demo Admin:</strong> admin@food.com / admin123
    </div>
  </div>

  <div style="text-align:center; margin-top:20px">
    <a href="{{ url_for('index') }}" style="color:var(--text-muted); font-size:.85rem">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>
  </div>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
